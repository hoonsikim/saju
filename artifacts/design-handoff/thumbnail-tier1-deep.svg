<?xml version="1.0" encoding="UTF-8"?>
<!-- Saju Deep Reading · Tier I · 1080×1080 · LS store thumbnail -->
<!-- Pattern: Claude Design v0.1 PillarThumbnail (4-pillar hanja hero) -->
<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#100d12"/>
      <stop offset="100%" stop-color="#06050a"/>
    </linearGradient>
  </defs>

  <!-- Background gradient -->
  <rect width="1080" height="1080" fill="url(#bgGrad)"/>

  <!-- Inner thin frame (gold @ 20%) -->
  <rect x="28" y="28" width="1024" height="1024" fill="none" stroke="#d4a574" stroke-opacity="0.2" stroke-width="1"/>

  <!-- Vertical brand line (left) -->
  <line x1="60" y1="60" x2="60" y2="1020" stroke="#2a2520" stroke-width="1"/>

  <!-- Top bar: 四 mark + SAJU · 四柱 left | tier tag right -->
  <g transform="translate(92, 56)">
    <!-- 四 box -->
    <rect x="0" y="0" width="36" height="36" fill="none" stroke="#d4a574" stroke-width="1"/>
    <text x="18" y="28" text-anchor="middle"
          font-family="'Noto Serif KR', 'Noto Serif SC', serif"
          font-size="22" fill="#d4a574">四</text>
    <text x="56" y="24"
          font-family="'JetBrains Mono', monospace"
          font-size="16" letter-spacing="5" fill="#8a7f6e">SAJU · 四柱</text>
  </g>
  <text x="1024" y="80" text-anchor="end"
        font-family="'JetBrains Mono', monospace"
        font-size="16" letter-spacing="4" fill="#8a7f6e">01 · 五領域 · FIVE DOMAINS</text>

  <!-- Four-pillar hero block (centered, 540 y axis) -->
  <!-- 4 pillars: HOUR · DAY · MONTH · YEAR (right-to-left convention reading): 庚午 / 戊子 / 己未 / 壬申 -->
  <!-- Layout: 4 columns evenly spaced -->
  <g font-family="'Noto Serif KR', 'Noto Serif SC', serif" font-weight="500">
    <!-- Column 1: 庚 / 午 / HOUR -->
    <g transform="translate(225, 540)">
      <text text-anchor="middle" y="-90" font-size="168" fill="#d4a574">庚</text>
      <line x1="-14" y1="-50" x2="14" y2="-50" stroke="#3a3328" stroke-width="1"/>
      <text text-anchor="middle" y="120" font-size="168" fill="#ede4d3">午</text>
      <text text-anchor="middle" y="180"
            font-family="'JetBrains Mono', monospace"
            font-size="13" letter-spacing="4" fill="#5e5648">HOUR</text>
    </g>
    <!-- Column 2: 戊 / 子 / DAY -->
    <g transform="translate(435, 540)">
      <text text-anchor="middle" y="-90" font-size="168" fill="#d4a574">戊</text>
      <line x1="-14" y1="-50" x2="14" y2="-50" stroke="#3a3328" stroke-width="1"/>
      <text text-anchor="middle" y="120" font-size="168" fill="#ede4d3">子</text>
      <text text-anchor="middle" y="180"
            font-family="'JetBrains Mono', monospace"
            font-size="13" letter-spacing="4" fill="#5e5648">DAY</text>
    </g>
    <!-- Column 3: 己 / 未 / MONTH -->
    <g transform="translate(645, 540)">
      <text text-anchor="middle" y="-90" font-size="168" fill="#d4a574">己</text>
      <line x1="-14" y1="-50" x2="14" y2="-50" stroke="#3a3328" stroke-width="1"/>
      <text text-anchor="middle" y="120" font-size="168" fill="#ede4d3">未</text>
      <text text-anchor="middle" y="180"
            font-family="'JetBrains Mono', monospace"
            font-size="13" letter-spacing="4" fill="#5e5648">MONTH</text>
    </g>
    <!-- Column 4: 壬 / 申 / YEAR -->
    <g transform="translate(855, 540)">
      <text text-anchor="middle" y="-90" font-size="168" fill="#d4a574">壬</text>
      <line x1="-14" y1="-50" x2="14" y2="-50" stroke="#3a3328" stroke-width="1"/>
      <text text-anchor="middle" y="120" font-size="168" fill="#ede4d3">申</text>
      <text text-anchor="middle" y="180"
            font-family="'JetBrains Mono', monospace"
            font-size="13" letter-spacing="4" fill="#5e5648">YEAR</text>
    </g>
  </g>

  <!-- Bottom row: title left + price tag right -->
  <g transform="translate(92, 940)">
    <text font-family="'EB Garamond', Georgia, serif"
          font-style="italic" font-size="64" fill="#ede4d3" letter-spacing="-0.6">Deep Reading</text>
    <text y="44"
          font-family="'Noto Serif KR', serif"
          font-size="32" fill="#8a7f6e" letter-spacing="2">심층 풀이</text>
  </g>
  <g transform="translate(1024, 950)">
    <!-- Price tag bordered box -->
    <rect x="-220" y="-46" width="220" height="68" fill="none" stroke="#d4a574" stroke-width="1"/>
    <text x="-200" y="-12"
          font-family="'JetBrains Mono', monospace"
          font-size="14" letter-spacing="4" fill="#8a7f6e">ONE-TIME</text>
    <text x="-200" y="14"
          font-family="'JetBrains Mono', monospace"
          font-size="40" font-weight="500" fill="#d4a574" letter-spacing="1">$7</text>
  </g>

  <!-- Corner ticks (designer signature) -->
  <g stroke="#d4a574" stroke-width="1" fill="none">
    <path d="M 28 50 L 28 28 L 50 28"/>
    <path d="M 1030 28 L 1052 28 L 1052 50"/>
    <path d="M 28 1030 L 28 1052 L 50 1052"/>
    <path d="M 1030 1052 L 1052 1052 L 1052 1030"/>
  </g>
</svg>
